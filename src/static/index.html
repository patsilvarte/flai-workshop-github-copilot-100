<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
      <div id="header-email-container">
        <label for="header-email">Your Email:</label>
        <input type="email" id="header-email" placeholder="your-email@mergington.edu" />
      </div>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="search-container">
          <input type="search" id="activity-search" placeholder="Search activities..." />
        </div>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>
    </main>

    <div id="message" class="hidden toast"></div>

    <!-- Confirmation Modal -->
    <div id="signup-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <h3 id="modal-title">Confirm Sign Up</h3>
        <p>Sign up <strong id="modal-email-display"></strong> for <strong id="modal-activity-display"></strong>?</p>
        <div class="modal-actions">
          <button id="modal-cancel-btn" class="btn-secondary">Cancel</button>
          <button id="modal-confirm-btn">Confirm</button>
        </div>
      </div>
    </div>

    <footer>
      <p>&copy; 2023 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
